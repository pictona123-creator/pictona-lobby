<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pictona — Today's Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:       #0fc4b5;
    --teal-dim:   #0a8f84;
    --teal-glow:  rgba(15,196,181,0.18);
    --navy:       #0b1628;
    --navy-mid:   #102035;
    --navy-card:  #142944;
    --navy-border:#1e3a5f;
    --white:      #ffffff;
    --off-white:  #e8eef5;
    --muted:      #7a90a8;
    --green:      #22c55e;
    --amber:      #f59e0b;
    --red:        #ef4444;
    --font-head:  'Barlow Condensed', sans-serif;
    --font-body:  'Barlow', sans-serif;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--navy);
    color: var(--white);
    font-family: var(--font-body);
    overflow: hidden;
  }

  /* subtle animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(15,196,181,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15,196,181,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* top-left glow blob */
  body::after {
    content: '';
    position: fixed;
    top: -160px;
    left: -160px;
    width: 480px;
    height: 480px;
    background: radial-gradient(circle, rgba(15,196,181,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 36px 32px 28px;
    gap: 0;
  }

  /* ── HEADER ─────────────────────────────────────────── */
  .hdr {
    flex-shrink: 0;
    margin-bottom: 28px;
  }

  .hdr-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .hdr-logo {
    font-family: var(--font-head);
    font-size: 2.6rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--white);
    line-height: 1;
  }
  .hdr-logo span {
    color: var(--teal);
  }

  .hdr-clock {
    text-align: right;
    font-family: var(--font-head);
  }
  .hdr-time {
    font-size: 2.8rem;
    font-weight: 700;
    color: var(--white);
    line-height: 1;
    letter-spacing: 0.03em;
  }
  .hdr-ampm {
    font-size: 1.1rem;
    color: var(--teal);
    font-weight: 600;
    letter-spacing: 0.1em;
  }

  .hdr-divider {
    height: 2px;
    background: linear-gradient(90deg, var(--teal) 0%, var(--teal-dim) 40%, transparent 100%);
    border-radius: 2px;
    margin-top: 14px;
  }

  .hdr-date-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
  }

  .hdr-date {
    font-family: var(--font-head);
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--off-white);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .hdr-section-title {
    font-family: var(--font-head);
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--teal);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* fallback pill */
  .fallback-pill {
    display: none;
    font-family: var(--font-head);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 20px;
    background: rgba(245,158,11,0.15);
    color: var(--amber);
    border: 1px solid rgba(245,158,11,0.3);
    margin-top: 8px;
  }
  .fallback-pill.visible { display: inline-block; }

  /* ── SCROLL AREA ─────────────────────────────────────── */
  .scroll-area {
    flex: 1;
    overflow: hidden;
    position: relative;
    min-height: 0;
  }

  /* fade out top and bottom edges */
  .scroll-area::before,
  .scroll-area::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 32px;
    z-index: 10;
    pointer-events: none;
  }
  .scroll-area::before {
    top: 0;
    background: linear-gradient(to bottom, var(--navy), transparent);
  }
  .scroll-area::after {
    bottom: 0;
    background: linear-gradient(to top, var(--navy), transparent);
  }

  .event-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 4px 0 4px;
    /* auto-scroll handled by JS */
  }

  /* ── EVENT CARD ──────────────────────────────────────── */
  .ev-card {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 14px;
    padding: 20px 22px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
    animation: fadeSlide 0.4s ease both;
  }

  /* left accent bar */
  .ev-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--accent-color, var(--teal));
    border-radius: 14px 0 0 14px;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ev-top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .ev-badge {
    font-family: var(--font-head);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--teal-glow);
    color: var(--teal);
    border: 1px solid rgba(15,196,181,0.2);
    white-space: nowrap;
  }

  .ev-avail {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-shrink: 0;
  }
  .ev-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ev-dot.green  { background: var(--green);  box-shadow: 0 0 6px rgba(34,197,94,0.6); }
  .ev-dot.amber  { background: var(--amber);  box-shadow: 0 0 6px rgba(245,158,11,0.6); }
  .ev-dot.red    { background: var(--red);    box-shadow: 0 0 6px rgba(239,68,68,0.5); }
  .ev-dot.gray   { background: var(--muted); }

  .ev-avail-text {
    font-family: var(--font-head);
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .ev-avail-text.green { color: var(--green); }
  .ev-avail-text.amber { color: var(--amber); }
  .ev-avail-text.red   { color: var(--red); }
  .ev-avail-text.gray  { color: var(--muted); }

  .ev-name {
    font-family: var(--font-head);
    font-size: 1.55rem;
    font-weight: 700;
    color: var(--white);
    line-height: 1.15;
    letter-spacing: 0.01em;
  }

  .ev-meta-row {
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }

  .ev-meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.95rem;
    color: var(--off-white);
    font-weight: 500;
  }
  .ev-meta-item svg {
    color: var(--teal);
    flex-shrink: 0;
    opacity: 0.8;
  }



  /* ── STATES ──────────────────────────────────────────── */
  .state-box {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 18px;
    text-align: center;
    padding: 40px 20px;
  }
  .state-box.visible { display: flex; }

  .state-icon { opacity: 0.4; color: var(--teal); }

  .state-box h3 {
    font-family: var(--font-head);
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--off-white);
    letter-spacing: 0.04em;
  }
  .state-box p {
    font-size: 1rem;
    color: var(--muted);
    max-width: 300px;
    line-height: 1.6;
  }

  /* spinner */
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(15,196,181,0.2);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FOOTER ──────────────────────────────────────────── */
  .ftr {
    flex-shrink: 0;
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .ftr-text {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    font-family: var(--font-head);
    text-transform: uppercase;
  }
  .ftr-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }

  /* stagger cards */
  .ev-card:nth-child(1)  { animation-delay: 0.05s; }
  .ev-card:nth-child(2)  { animation-delay: 0.10s; }
  .ev-card:nth-child(3)  { animation-delay: 0.15s; }
  .ev-card:nth-child(4)  { animation-delay: 0.20s; }
  .ev-card:nth-child(5)  { animation-delay: 0.25s; }
  .ev-card:nth-child(6)  { animation-delay: 0.30s; }
  .ev-card:nth-child(7)  { animation-delay: 0.35s; }
  .ev-card:nth-child(8)  { animation-delay: 0.40s; }
  .ev-card:nth-child(9)  { animation-delay: 0.45s; }
  .ev-card:nth-child(10) { animation-delay: 0.50s; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-top">
      <div class="hdr-logo">PICTO<span>NA</span></div>
      <div class="hdr-clock">
        <div class="hdr-time" id="clock-time">12:00</div>
        <div class="hdr-ampm" id="clock-ampm">PM</div>
      </div>
    </div>
    <div class="hdr-divider"></div>
    <div class="hdr-date-row">
      <div class="hdr-date" id="hdr-date">Friday, March 28</div>
      <div class="hdr-section-title">Today's Schedule</div>
    </div>
    <div class="fallback-pill" id="fallback-pill">▸ Showing Tomorrow</div>
  </header>

  <!-- EVENT LIST -->
  <div class="scroll-area" id="scroll-area">
    <!-- Loading -->
    <div class="state-box visible" id="state-loading">
      <div class="spinner"></div>
      <p style="color:var(--muted);font-size:1rem;">Loading today's schedule…</p>
    </div>
    <!-- Empty -->
    <div class="state-box" id="state-empty">
      <div class="state-icon">
        <svg width="56" height="56" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5"/>
        </svg>
      </div>
      <h3>No Events Today</h3>
      <p>Nothing is scheduled. Enjoy some free court time!</p>
    </div>
    <!-- Error -->
    <div class="state-box" id="state-error">
      <div class="state-icon" style="color:var(--red)">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
        </svg>
      </div>
      <h3>Connection Error</h3>
      <p>Unable to load schedule. Retrying…</p>
    </div>
    <!-- Cards -->
    <div class="event-list" id="event-list"></div>
  </div>

  <!-- FOOTER -->
  <footer class="ftr">
    <span class="ftr-text">Refreshes every 5 min</span>
    <div class="ftr-dot"></div>
    <span class="ftr-text">courtreserve.com</span>
  </footer>

</div>

<script>
const WORKER = 'https://hidden-leaf-c74c.pictona123.workers.dev';
const REFRESH_MS = 5 * 60 * 1000;

// ── Clock ─────────────────────────────────────────────────
function tickClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock-time').textContent = `${h}:${String(m).padStart(2,'0')}`;
  document.getElementById('clock-ampm').textContent = ampm;
}
setInterval(tickClock, 1000);
tickClock();

// ── Date helpers ──────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }
function isoDate(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function dayStart(d) { return isoDate(d) + 'T00:00:00'; }
function dayEnd(d)   { return isoDate(d) + 'T23:59:59'; }

function labelDate(d) {
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function formatTime(iso) {
  const d = new Date(iso);
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}${m ? ':' + pad(m) : ''} ${ampm}`;
}

// ── Availability (events only) ────────────────────────────
function getAvail(ev) {
  const max = ev.MaxRegistrants, reg = ev.RegisteredCount || 0;
  if (max === null || max === undefined) return { dot: 'gray', text: 'Open' };
  const spots = max - reg;
  if (spots > 5)  return { dot: 'green', text: `${spots} spots open` };
  if (spots > 0)  return { dot: 'amber', text: `${spots} spot${spots===1?'':'s'} left` };
  if (ev.AllowWaitlist) return { dot: 'red', text: 'Waitlist' };
  return { dot: 'red', text: 'Full' };
}

// ── Render ────────────────────────────────────────────────
function showState(id) {
  ['state-loading','state-empty','state-error','event-list'].forEach(s => {
    const el = document.getElementById(s);
    if (s === 'event-list') {
      el.style.display = s === id ? 'flex' : 'none';
    } else {
      el.classList.toggle('visible', s === id);
    }
  });
}

function renderAll(items) {
  const list = document.getElementById('event-list');
  list.innerHTML = '';

  // Sort everything by start time
  items.sort((a, b) => new Date(a._start) - new Date(b._start));

  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'ev-card';
    card.style.animationDelay = `${0.05 + i * 0.06}s`;

    if (item._type === 'event') {
      // ── Event card ──
      const avail  = getAvail(item);
      const court  = item.Courts && item.Courts.length ? item.Courts[0].Label : null;
      const accent = (item.BackgroundColor && item.BackgroundColor !== '#ffffff' && item.BackgroundColor !== '#FFFFFF')
                     ? item.BackgroundColor : 'var(--teal)';
      card.style.setProperty('--accent-color', accent);
      card.innerHTML = `
        <div class="ev-top-row">
          <span class="ev-badge">${item.EventCategoryName || 'Event'}</span>
          <div class="ev-avail">
            <div class="ev-dot ${avail.dot}"></div>
            <span class="ev-avail-text ${avail.dot}">${avail.text}</span>
          </div>
        </div>
        <div class="ev-name">${item.EventName}</div>
        <div class="ev-meta-row">
          <div class="ev-meta-item">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 6v6l3 3"/>
            </svg>
            ${formatTime(item.StartDateTime)} – ${formatTime(item.EndDateTime)}
          </div>
          ${court ? `<div class="ev-meta-item">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
            </svg>
            ${court}
          </div>` : ''}
        </div>`;

    } else {
      // ── Reservation card ──
      const accent = (item._accent && item._accent !== '#ffffff' && item._accent !== '#FFFFFF')
                     ? item._accent : '#3a31cb';
      card.style.setProperty('--accent-color', accent);
      card.innerHTML = `
        <div class="ev-top-row">
          <span class="ev-badge" style="background:rgba(58,49,203,0.18);color:#a89fff;border-color:rgba(58,49,203,0.3)">Court Reservation</span>
        </div>
        <div class="ev-name">${item.ReservationTypeName || 'Court Reservation'}</div>
        <div class="ev-meta-row">
          <div class="ev-meta-item">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 6v6l3 3"/>
            </svg>
            ${formatTime(item.StartTime)} – ${formatTime(item.EndTime)}
          </div>
          ${item.Courts ? `<div class="ev-meta-item">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
            </svg>
            ${item.Courts}
          </div>` : ''}
        </div>`;
    }

    list.appendChild(card);
  });

  showState('event-list');
  startAutoScroll();
}

// ── Auto-scroll ───────────────────────────────────────────
let scrollTimer = null;
let scrollDir   = 1;

function startAutoScroll() {
  if (scrollTimer) clearInterval(scrollTimer);
  const area = document.getElementById('scroll-area');
  const list = document.getElementById('event-list');

  scrollTimer = setInterval(() => {
    const maxScroll = list.scrollHeight - area.clientHeight;
    if (maxScroll <= 0) return;

    area.scrollTop += scrollDir * 1.2;

    if (area.scrollTop >= maxScroll - 4) {
      clearInterval(scrollTimer);
      setTimeout(() => { scrollDir = -1; startAutoScroll(); }, 3000);
    } else if (area.scrollTop <= 0) {
      clearInterval(scrollTimer);
      setTimeout(() => { scrollDir = 1; startAutoScroll(); }, 3000);
    }
  }, 30);
}

// ── Fetch events ──────────────────────────────────────────
async function fetchEvents(d) {
  const url = `${WORKER}?startDate=${dayStart(d)}&endDate=${dayEnd(d)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (!json.IsSuccessStatusCode) throw new Error(json.ErrorMessage || 'API error');
  const target = isoDate(d);
  return (json.Data || [])
    .filter(ev => !ev.IsCanceled && ev.StartDateTime && ev.StartDateTime.startsWith(target))
    .map(ev => ({ ...ev, _type: 'event', _start: ev.StartDateTime }));
}

// ── Fetch reservations ────────────────────────────────────
async function fetchReservations(d) {
  const start = dayStart(d);
  const end   = dayEnd(d);
  const url   = `${WORKER}?endpoint=reservationreport&reservationsFromDate=${start}&reservationsToDate=${end}`;
  try {
    const res  = await fetch(url);
    if (!res.ok) return [];
    const json = await res.json();
    if (!json.IsSuccessStatusCode) return [];
    const target = isoDate(d);
    return (json.Data || [])
      .filter(r => r.StartTime && r.StartTime.startsWith(target) && !r.CancelledOn)
      .map(r => ({ ...r, _type: 'reservation', _start: r.StartTime, _accent: '#3a31cb' }));
  } catch { return []; }
}

// ── Load ──────────────────────────────────────────────────
async function load() {
  showState('state-loading');
  if (scrollTimer) clearInterval(scrollTimer);

  const today    = new Date();
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  const pill     = document.getElementById('fallback-pill');
  const dateEl   = document.getElementById('hdr-date');

  try {
    let [events, reservations] = await Promise.all([
      fetchEvents(today),
      fetchReservations(today)
    ]);

    let useFallback = events.length === 0 && reservations.length === 0;

    if (useFallback) {
      [events, reservations] = await Promise.all([
        fetchEvents(tomorrow),
        fetchReservations(tomorrow)
      ]);
    }

    const displayDate = useFallback ? tomorrow : today;
    dateEl.textContent = labelDate(displayDate);
    pill.classList.toggle('visible', useFallback);

    const all = [...events, ...reservations];
    if (all.length === 0) {
      showState('state-empty');
      return;
    }

    renderAll(all);

  } catch (err) {
    console.error('Pictona lobby error:', err);
    showState('state-error');
    setTimeout(load, 30000);
  }
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
